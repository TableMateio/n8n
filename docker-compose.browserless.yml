version: '3'

services:
  browserless:
    image: ghcr.io/browserless/chromium
    container_name: browserless
    ports:
      - '3000:3000'
    environment:
      - MAX_CONCURRENT_SESSIONS=10
      - CONNECTION_TIMEOUT=60000
      - TOKEN=6R0W53R135510
      - ENABLE_DEBUG_VIEWER=true
      - PREBOOT_CHROME=true
    restart: unless-stopped
